version: '3.8'

services:
  # PostgreSQL Database
  database:
    image: postgres:15-alpine
    container_name: punch-clock-db
    environment:
      POSTGRES_DB: punch_clock_db
      POSTGRES_USER: punch_user
      POSTGRES_PASSWORD: punch_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init:/docker-entrypoint-initdb.d
    networks:
      - punch-clock-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U punch_user -d punch_clock_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: punch-clock-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - punch-clock-network
    command: redis-server --appendonly yes --requirepass redis_password
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: punch-clock-backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://punch_user:punch_password@database:5432/punch_clock_db?schema=public
      REDIS_URL: redis://:redis_password@redis:6379
      JWT_SECRET: dev-jwt-secret-change-in-production
      CORS_ORIGIN: http://localhost:3000
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - punch-clock-network
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - backend_logs:/app/logs
    command: npm run dev

  # Frontend Application
  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: punch-clock-frontend
    environment:
      NODE_ENV: development
      NEXT_PUBLIC_API_URL: http://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - punch-clock-network
    volumes:
      - ./apps/frontend/src:/app/src

  # Nginx Load Balancer (Optional)
  nginx:
    image: nginx:alpine
    container_name: punch-clock-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/ssl:/etc/nginx/ssl
    depends_on:
      - frontend
      - backend
    networks:
      - punch-clock-network

networks:
  punch-clock-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  backend_logs: